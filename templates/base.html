{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión Logística ChileanTrading{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'css/base-styles.css' %}" rel="stylesheet">
    {% block extra_css %}{% endblock %}

</head>

<body>

<div class="container mt-4 {% block page_container_class %}{% endblock %}">

    {% block page_header %}
    <h3 class="text-center fw-bold text-primary mb-4">
        {% block header %}{% endblock %}
    </h3>
    {% endblock %}

    {% block content %}{% endblock %}

    {% block footer_logout %}
    <!-- <div class="d-flex justify-content-center mt-4">
        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="btn btn-danger logout-btn">
                <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
            </button>
        </form>
    </div> -->
    {% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" defer></script>
<script src="{% static 'js/session-control.js' %}" defer></script>

</body>
</html>
