<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión Logística ChileanTrading{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
    :root {
        --azul-metal: #0a3d62;
        --azul-metal-claro: #3c6382;
        --azul-hover: #82ccdd;
        --blanco: #ffffff;
    }

    body { background: #f5f6fa; }

    .logout-btn { 
        border-radius: 12px; 
        font-weight: 600; 
    }

    /* TABLAS */
    .table-scroll {
        height: 600px;
        overflow-y: auto;
    }
    .table thead th {
        position: sticky;
        top: 0;
        background: #e8e8e8;
        z-index: 10;
        font-weight: bold;
        border-bottom: 2px solid var(--azul-metal);
    }

    /* BOTÓN VOLVER */
    .btn-volver {
        background: #0a3d62;
        color: white;
        padding: 6px 14px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        display: inline-block;
    }
    .btn-volver:hover {
        background: #3c6382;
    }

    /* 📱📱 --- RESPONSIVE --- 📱📱 */

    /* Teléfonos muy pequeños (320px – 480px) */
    @media (max-width: 480px) {

        h3 {
            font-size: 1.3rem;
        }

        .container {
            padding-left: 8px;
            padding-right: 8px;
        }

        .btn-volver {
            padding: 5px 10px;
            font-size: 0.8rem;
        }

        .table-scroll {
            height: auto;
            max-height: 350px;
        }
    }

    /* Tablets y móviles grandes (481px – 768px) */
    @media (max-width: 768px) {

        .btn-volver {
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        .container {
            padding-left: 12px;
            padding-right: 12px;
        }

        h3 {
            font-size: 1.5rem;
        }

        .table-scroll {
            height: auto;
            max-height: 450px;
        }
    }

</style>
</head>

<body>

<div class="container mt-4">

    <h3 class="text-center fw-bold text-primary mb-4">
        {% block header %}{% endblock %}
    </h3>

    {% block content %}{% endblock %}
    <div class="d-flex justify-content-center mt-4">
        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="btn btn-danger logout-btn">
                <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
            </button>
        </form>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    // Configuración de sesión (debe coincidir con SESSION_COOKIE_AGE en settings.py)
    const SESSION_TIMEOUT = 28800; // 8 horas en segundos
    const WARNING_TIME = 1500; // Mostrar advertencia 25 minutos antes (1500 segundos)
    
    let inactivityTimer = null;
    let warningShown = false;
    
    const resetInactivityTimer = () => {
        clearTimeout(inactivityTimer);
        warningShown = false;
        
        // Establecer temporizador para mostrar advertencia
        inactivityTimer = setTimeout(() => {
            if (!warningShown) {
                showInactivityWarning();
                warningShown = true;
            }
        }, (SESSION_TIMEOUT - WARNING_TIME) * 1000);
    };
    
    const showInactivityWarning = () => {
        // Crear modal de advertencia
        const warningHTML = `
            <div class="modal fade" id="inactivityWarning" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content border-warning">
                        <div class="modal-header bg-warning text-dark">
                            <h5 class="modal-title">⏰ Sesión por Expirar</h5>
                        </div>
                        <div class="modal-body">
                            <p>Tu sesión expirará en <strong id="countdown">25</strong> minutos por inactividad.</p>
                            <p>Haz clic en <strong>"Renovar Sesión"</strong> para continuar trabajando.</p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-warning" id="renewSession">
                                🔄 Renovar Sesión
                            </button>
                            <a href="/logout/" class="btn btn-danger">
                                🚪 Cerrar Sesión
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        // Agregar modal al documento si no existe
        if (!document.getElementById('inactivityWarning')) {
            document.body.insertAdjacentHTML('beforeend', warningHTML);
        }
        
        // Mostrar modal con opciones (no cerrable con Escape ni al hacer clic afuera)
        const warningModal = document.getElementById('inactivityWarning');
        const modal = new bootstrap.Modal(warningModal, {
            backdrop: 'static',
            keyboard: false
        });
        modal.show();
        
        // Actualizar contador cada segundo
        let remainingTime = WARNING_TIME;
        const countdownInterval = setInterval(() => {
            remainingTime--;
            const minutes = Math.ceil(remainingTime / 60);
            document.getElementById('countdown').textContent = minutes;
            
            if (remainingTime <= 0) {
                clearInterval(countdownInterval);
                modal.hide();
                // Redirigir a logout
                window.location.href = '/logout/';
            }
        }, 1000);
        
        // Renovar sesión al hacer click en botón
        document.getElementById('renewSession').addEventListener('click', () => {
            modal.hide();
            // Hacer request para mantener viva la sesión
            fetch('/', { method: 'HEAD' })
                .then(() => {
                    resetInactivityTimer();
                })
                .catch(() => {
                    console.log('Error al renovar sesión');
                });
        });
    };
    
    // Detectar actividad del usuario
    const userActivityEvents = ['mousedown', 'keydown', 'scroll', 'touchstart', 'click'];
    
    userActivityEvents.forEach(event => {
        document.addEventListener(event, () => {
            resetInactivityTimer();
        }, true);
    });
    
    // Iniciar temporizador al cargar la página
    resetInactivityTimer();
});
</script>

</body>
</html>
