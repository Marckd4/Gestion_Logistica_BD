<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rebaje Masivo Excel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Arial;
}

.panel{
max-width:600px;
margin:80px auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0px 4px 15px rgba(0,0,0,0.1);
}

.titulo{
text-align:center;
margin-bottom:30px;
}

</style>

</head>

<body>

<div class="panel">

<div class="titulo">
<h3><i class="bi bi-file-earmark-arrow-down"></i> Rebaje Masivo por Excel</h3>
<p class="text-muted">Cargar archivo para rebajar inventario</p>
</div>

<form method="post" enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">Seleccionar Bodega</label>

<select name="bodega" class="form-select">
<option value="central">Bodega Central</option>
<option value="bsf">Bodega BSF</option>
</select>

</div>

<div class="mb-4">

<label class="form-label">Archivo Excel</label>

<input type="file" name="archivo" class="form-control">

</div>

<div class="d-flex justify-content-between">

<a href="/" class="btn btn-secondary">
<i class="bi bi-arrow-left"></i> Volver
</a>

<button type="submit" class="btn btn-primary">
<i class="bi bi-upload"></i> Procesar Excel
</button>

</div>

</form>

</div>

</body>
</html>
